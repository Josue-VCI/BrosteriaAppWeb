<div class="app-layout" [class.sidebar-active]="sidebarAbierto">
  <!-- Botón hamburguesa para móvil -->
  <button class="mobile-toggle" *ngIf="mostrarSidebar" (click)="toggleSidebar()">
    ☰
  </button>

  <!-- Sidebar de Navegación Lateral -->
  <aside class="sidebar glass-card" *ngIf="mostrarSidebar">
    <div class="sidebar-brand">
      <span class="brand-icon"><i class="fa-solid fa-drumstick-bite"></i></span>
      <h3>La Brostería CRM</h3>
    </div>
    
    <nav class="sidebar-menu">
      <a *ngIf="esAdmin" routerLink="/dashboard" routerLinkActive="active" class="menu-item">
        <span class="menu-icon"><i class="fa-solid fa-chart-line"></i></span> Dashboard
      </a>
      <a routerLink="/pedidos" routerLinkActive="active" class="menu-item">
        <span class="menu-icon"><i class="fa-solid fa-fire-burner"></i></span> Pedidos / Cocina
      </a>
      <a routerLink="/inventario" routerLinkActive="active" class="menu-item">
        <span class="menu-icon"><i class="fa-solid fa-box-open"></i></span> Inventario
      </a>
      <a routerLink="/clientes" routerLinkActive="active" class="menu-item">
        <span class="menu-icon"><i class="fa-solid fa-users"></i></span> Clientes
      </a>
      <a *ngIf="esAdmin" routerLink="/reportes" routerLinkActive="active" class="menu-item">
        <span class="menu-icon"><i class="fa-solid fa-chart-pie"></i></span> Reportes Analíticos
      </a>
    </nav>
    
    <div class="sidebar-footer">
      <div class="user-info">
        <span class="user-avatar"><i class="fa-solid fa-user"></i></span>
        <div class="user-text">
          <span class="user-name">{{ usuarioNombre }}</span>
          <span class="user-status text-success">● En línea</span>
        </div>
      </div>
      <button class="logout-btn brand-btn" (click)="logout()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</button>
    </div>
  </aside>

  <!-- Contenedor Principal de Vistas -->
  <main class="main-content" [class.no-sidebar]="!mostrarSidebar">
    <router-outlet></router-outlet>
  </main>
</div>
