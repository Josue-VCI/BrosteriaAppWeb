<div class="app-layout" [class.sidebar-active]="sidebarAbierto">
  <!-- Botón hamburguesa para móvil -->
  <button class="mobile-toggle" *ngIf="mostrarSidebar" (click)="toggleSidebar()">
    ☰
  </button>

  <!-- Sidebar de Navegación Lateral -->
  <aside class="sidebar glass-card" *ngIf="mostrarSidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">🍗</span>
      <h3>La Brostería CRM</h3>
    </div>
    
    <nav class="sidebar-menu">
      <a routerLink="/dashboard" routerLinkActive="active" class="menu-item">
        <span class="menu-icon">📈</span> Dashboard
      </a>
      <a routerLink="/pedidos" routerLinkActive="active" class="menu-item">
        <span class="menu-icon">🍳</span> Pedidos / Cocina
      </a>
      <a routerLink="/inventario" routerLinkActive="active" class="menu-item">
        <span class="menu-icon">📦</span> Inventario
      </a>
      <a routerLink="/clientes" routerLinkActive="active" class="menu-item">
        <span class="menu-icon">👥</span> Clientes
      </a>
      <a routerLink="/reportes" routerLinkActive="active" class="menu-item">
        <span class="menu-icon">📊</span> Reportes Analíticos
      </a>
    </nav>
    
    <div class="sidebar-footer">
      <div class="user-info">
        <span class="user-avatar">👤</span>
        <div class="user-text">
          <span class="user-name">{{ usuarioNombre }}</span>
          <span class="user-status text-success">● En línea</span>
        </div>
      </div>
      <button class="logout-btn brand-btn" (click)="logout()">🔒 Cerrar Sesión</button>
    </div>
  </aside>

  <!-- Contenedor Principal de Vistas -->
  <main class="main-content" [class.no-sidebar]="!mostrarSidebar">
    <router-outlet></router-outlet>
  </main>
</div>
