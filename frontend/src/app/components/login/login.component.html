<div class="login-wrapper">
  <div class="login-card glass-card">
    <div class="login-header">
      <div class="logo-circle"><i class="fa-solid fa-drumstick-bite"></i></div>
      <h2>La Brosteria</h2>
      <p>Panel de Gestion de Ventas y CRM</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Correo Electronico</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" required placeholder="cajero@brosteria.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" required placeholder="••••••••">
      </div>

      <div class="error-banner" *ngIf="errorMsg">
        <i class="fa-solid fa-triangle-exclamation"></i> {{ errorMsg }}
      </div>

      <button type="submit" class="brand-btn submit-btn" [disabled]="cargando">
        {{ cargando ? 'Ingresando...' : 'Iniciar Sesion' }}
      </button>
    </form>
    
    <div class="login-footer">
      <span>Demo personal: admin&#64;brosteria.com / admin123</span>
    </div>
  </div>
</div>
