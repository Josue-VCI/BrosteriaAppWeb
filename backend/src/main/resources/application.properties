spring.application.name=BrosteriaCRM
server.port=${PORT:8081}

# Base de Datos apuntando al Pooler de Supabase (Evita UnknownHostException)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Optimizaciones del Pool de Conexiones HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000

# Inicializacion automatica con data.sql
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Configuracion de Seguridad JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Configuracion SMTP de Gmail (Ajustar credenciales de produccion)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# Alertas de inventario por despliegue
stock.alert.email=${STOCK_ALERT_EMAIL:${MAIL_USERNAME}}
stock.alert.cooldown-hours=${STOCK_ALERT_COOLDOWN_HOURS:12}
